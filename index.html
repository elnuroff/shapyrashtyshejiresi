<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Шежіре - Шапырашты (Жеті Ата)</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            overflow-x: auto;
            overflow-y: hidden; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            scroll-behavior: smooth;
        }

        #tree-wrapper {
            display: flex;
            gap: 70px;
            padding: 150px;
            align-items: center;
        }

        .level {
            display: flex;
            flex-direction: column;
            gap: 12px;
            justify-content: center;
        }

        .node {
            background: #f3f4f6;
            color: #111827;
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            font-weight: 600;
            z-index: 10;
            text-align: center;
            border: 2px solid transparent;
        }

        .node:hover {
            transform: scale(1.08);
            background: #10b981;
            color: white;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.6);
        }

        .node.active {
            background: #10b981;
            color: white;
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.8);
            border-color: #34d399;
        }

        .node[data-special="hero"] {
            background: #fbbf24;
            color: #78350f;
            border-color: #d97706;
        }

        /* Жеті ата панелінің стилі */
        #ancestors-panel {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 41, 59, 0.95);
            padding: 15px 40px;
            border-radius: 100px;
            border: 2px solid #10b981;
            display: none;
            flex-wrap: nowrap;
            gap: 12px;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            align-items: center;
            backdrop-filter: blur(10px);
            white-space: nowrap;
        }

        .ancestor-label {
            color: #fbbf24;
            font-weight: bold;
            margin-right: 10px;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .ancestor-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ancestor-name {
            color: #fff;
            font-weight: 500;
        }

        .ancestor-arrow {
            color: #4ade80;
            font-weight: bold;
        }

        .fade-in {
            opacity: 0;
            transform: translateX(-30px);
            animation: slideRight 0.5s ease forwards;
        }

        @keyframes slideRight {
            to { opacity: 1; transform: translateX(0); }
        }

        ::-webkit-scrollbar { height: 10px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
    </style>
</head>
<body>

<div id="tree-wrapper"></div>
<div id="ancestors-panel"></div>

<script>
const shezhireData = {
    "Алаш": ["Ұлы жүз", "Орта жүз", "Кіші жүз", "Жүзден тыс"],
    "Ұлы жүз": ["Қаңлы", "Шанышқылы", "Сіргелі", "Сарыүйсін", "Шапырашты", "Жалайыр", "Ысты", "Ошақты", "Албан", "Суан", "Дулат"],
    "Шапырашты": ["Ыстық (Шам)"],
    "Ыстық (Шам)": ["Малдыыстық", "Желдіыстық", "Қалдыыстық"],
    "Малдыыстық": ["Екей", "Еміл"],
    "Екей": ["Жәрімбет", "Бәйімбет"],
    "Бәйімбет": ["Ақет", "Морға", "Тілеуімбет", "Қарамерген", "Алдаберген", "Қызылқамшы (Тыныбек)", "Жанас", "Қожабек", "Қамаушы(Бекпенбет)", "Шындәулет", "Мұғал"],
    "Еміл": ["Жайық", "Есқожа"],
    "Жайық": ["Ермен", "Сүйіндік", "Сиыршы", "Сәтбек", "Тайторы"],
    "Жәрімбет": ["Бертіс", "Ақтөбет", "Әжібай", "Әлти", "Баянай"],
    "Әжібай": ["Қосай"],
    "Қосай": ["Ыстыбай", "Дәуірбай"],
    "Ыстыбай": ["Ақмырза-Аққосай"],
    "Ақмырза-Аққосай": ["Байбол", "Қойбақ", "Қасабай", "Темір", "Малкелді"],
    "Байбол": ["Қуат", "Мөлжігіт", "Қонақ", "Малдыбай", "Сырымбет"],
    "Қуат": ["Рысқұл", "Төле", "Қуаш"],
    "Рысқұл": ["Әліке", "Манабай"],
    "Манабай": ["Досжан", "Дәуренбай", "Ахмет"],
    "Ахмет": ["Әлімбек", "Жұмабай", "Жақыпбек"],
    "Әлімбек": ["Жанат", "Серік", "Марат"],
    "Жанат": ["Талғат"],
    "Серік": ["Азамат", "Асқат", "Шыңғыс", "Искандер", "Нурдаулет"],
    "Марат": ["Қайрат", "Алмас"],
    "Жақыпбек": ["Асқар", "Дәулет"],
    "Асқар": ["Алихан", "Әмір"],
    "Жұмабай": ["Болат"],
    "Болат": ["Данияр", "Ұлан", "Елнұр"],
    "Есқожа": ["Алысай", "Алтынай", "Шуаш"],
    "Алтынай": ["Қарасай"],
    "Қарасай": ["Еркен", "Төркен", "Әуез", "Өтеп", "Түрікпен", "Көшек"],
    "Желдіыстық": ["Асыл", "Шыбыл"],
    "Асыл": ["Әжіке", "Кеней", "Орынбет", "Құлан", "Жанай", "Теке", "Төлеміс"],
    "Шыбыл": ["Жәдік", "Малай", "Байыс", "Ибақ", "Сары"],
    "Қалдыыстық": ["Айқым"],
    "Айқым": ["Қайдауыл", "Сейітқұл", "Қалқаман"],
    "Қайдауыл": ["Қарамолда", "Байымбет", "Жарымбет", "Сырымбет", "Медет", "Жолай"],
    "Сейітқұл": ["Береке(Көнтек)"],
    "Қалқаман": ["Байғұл", "Шал", "Атан Сары", "Тәнді", "Шөмпіш"]
};

const wrapper = document.getElementById("tree-wrapper");
const panel = document.getElementById("ancestors-panel");

// Кері бағытта ата-аналарды іздеу алгоритмі
function findPath(targetName) {
    let resultPath = [];
    function search(current, path) {
        if (current === targetName) {
            resultPath = [...path, current];
            return true;
        }
        let children = shezhireData[current];
        if (children) {
            for (let child of children) {
                if (search(child, [...path, current])) return true;
            }
        }
        return false;
    }
    search("Алаш", []);
    return resultPath;
}

// Жеті атаны көрсету функциясы
function updateSevenAncestors(name) {
    const path = findPath(name);
    if (path.length > 0) {
        panel.style.display = "flex";
        const reversedPath = [...path].reverse(); // Өзінен бастап жоғары қарай
        
        let html = `<div class="ancestor-label">Жеті ата:</div>`;
        reversedPath.forEach((n, index) => {
            if (index < 7) { // Тек 7 ұрпақ
                html += `
                    <div class="ancestor-item">
                        <span class="ancestor-name">${n}</span>
                        ${(index < 6 && index < reversedPath.length - 1) ? '<span class="ancestor-arrow">←</span>' : ''}
                    </div>
                `;
            }
        });
        panel.innerHTML = html;
    }
}

function addLevel(names, levelIndex) {
    const levelDiv = document.createElement("div");
    levelDiv.className = "level";
    levelDiv.id = "level-" + levelIndex;

    names.forEach((name, i) => {
        const node = document.createElement("div");
        node.className = "node fade-in";
        node.innerText = name;
        node.style.animationDelay = (i * 0.04) + "s";

        if (name === "Қарасай") node.setAttribute("data-special", "hero");

        node.onclick = function() {
            clearLevels(levelIndex + 1);
            Array.from(levelDiv.children).forEach(n => n.classList.remove('active'));
            node.classList.add('active');

            // Жеті атаны жаңарту
            updateSevenAncestors(name);

            if (shezhireData[name]) {
                addLevel(shezhireData[name], levelIndex + 1);
                setTimeout(() => {
                    const nextLevel = document.getElementById("level-" + (levelIndex + 1));
                    if (nextLevel) nextLevel.scrollIntoView({ behavior: 'smooth', inline: 'center' });
                }, 100);
            }
        };
        levelDiv.appendChild(node);
    });
    wrapper.appendChild(levelDiv);
}

function clearLevels(fromIndex) {
    let i = fromIndex;
    while (document.getElementById("level-" + i)) {
        document.getElementById("level-" + i).remove();
        i++;
    }
}

addLevel(["Алаш"], 0);
</script>
</body>
</html>
